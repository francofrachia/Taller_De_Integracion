<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloque Mundo | Tienda de LEGOs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">Bloque Mundo</div>

            <ul class="nav-links">
                <li><a href="#" class="active">Inicio</a></li>
                <li><a href="#">Contacto</a></li>
                <li><a href="#">Acerca de</a></li>
                <li><a href="#">Iniciar sesión</a></li>
            </ul>

            <div class="nav-actions">
                <div class="search-container">
                    <input type="text" placeholder="¿Qué estás buscando?">
                    <button>🔍</button>
                </div>
                <div class="icons">
                    <span class="icon-heart">🤍</span>
                    <span class="icon-cart">🛒 <small class="cart-count">0</small></span>
                    <span class="icon-user">👤</span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="banner">
            <h2>¡Encontrá tu próximo desafío!</h2>
        </section>

        <section id="contenedor-productos" class="grid-productos">
            <p>Cargando productos...</p>
        </section>
    </main>

    <script src="assets/js/main.js"></script>
</body>

</html>
